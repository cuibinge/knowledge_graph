<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>滨海湿地知识图谱</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #f5f7fa;
      font-family: Arial, sans-serif;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .head {
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      font-size: 20px;
      font-weight: 600;
    }
    .viewer {
      flex: 1;
      overflow: auto;
      background: #fafafa;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
    }
    img {
      max-width: none;
      height: auto;
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">滨海湿地知识图谱</div>
    <div class="viewer">
      <img src="graph.svg" alt="滨海湿地知识图谱 SVG" />
    </div>
  </div>
</body>
</html>
